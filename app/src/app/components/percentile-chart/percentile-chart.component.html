@if (chartData.length > 0) {
  <div
    class="mb-6 rounded-xl border border-slate-700/70 bg-slate-900 p-6 shadow-xl"
  >
    <div
      class="mb-4 flex flex-col gap-4 md:flex-row md:items-end md:justify-between"
    >
      <div class="flex items-center gap-2">
        <h2 class="text-xl font-semibold text-slate-100">
          Where You Gain or Lose Time
        </h2>
        <button
          type="button"
          class="inline-flex h-6 w-6 items-center justify-center rounded-full border border-slate-600 text-slate-300 hover:border-sky-400 hover:text-sky-300"
          data-tooltip-target="tooltip-gain-loss"
          data-tooltip-placement="right"
          aria-label="Gain or lose chart explanation"
        >
          ?
        </button>
        <div
          id="tooltip-gain-loss"
          role="tooltip"
          class="tooltip invisible absolute z-10 inline-block max-w-xs rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-xs font-medium text-slate-100 opacity-0 shadow-xs transition-opacity duration-200"
        >
          Heatmap of all race events vs field average. Green means faster than
          average, red means slower.
          <div class="tooltip-arrow" data-popper-arrow></div>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-2 text-xs md:text-sm">
        <div
          class="rounded-lg border border-emerald-700/70 bg-emerald-950/40 px-3 py-2 text-emerald-300"
        >
          Faster: <span class="font-semibold">{{ fasterCount }}</span>
        </div>
        <div
          class="rounded-lg border border-rose-700/70 bg-rose-950/40 px-3 py-2 text-rose-300"
        >
          Slower: <span class="font-semibold">{{ slowerCount }}</span>
        </div>
        <div
          class="rounded-lg border border-slate-600 bg-slate-800/70 px-3 py-2 text-slate-200"
        >
          Net:
          <span
            class="font-semibold"
            [ngClass]="
              netDeltaSeconds <= 0 ? 'text-emerald-300' : 'text-rose-300'
            "
            >{{ netDeltaSeconds > 0 ? '+' : '' }}{{ netDeltaSeconds }}s</span
          >
        </div>
      </div>
    </div>

    <div class="rounded-lg border border-slate-700 bg-slate-950/70 p-3">
      @if (chartOptions) {
        <apx-chart
          [series]="chartOptions.series"
          [chart]="chartOptions.chart"
          [xaxis]="chartOptions.xaxis"
          [yaxis]="chartOptions.yaxis"
          [colors]="chartOptions.colors"
          [tooltip]="chartOptions.tooltip"
          [plotOptions]="chartOptions.plotOptions"
          [grid]="chartOptions.grid"
          [legend]="chartOptions.legend"
          [dataLabels]="chartOptions.dataLabels"
        ></apx-chart>
      }
    </div>
  </div>
}
